<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>VEF ERP · Administración</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f0f4f8;min-height:100vh;color:#1e293b}

/* ── LOGIN ── */
#loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0a1628 0%,#0D2B55 60%,#1a3a6b 100%)}
.login-box{background:#fff;border-radius:20px;width:100%;max-width:400px;padding:44px 40px;
  box-shadow:0 24px 80px rgba(0,0,0,.4);text-align:center}
.login-logo{width:64px;height:64px;background:linear-gradient(135deg,#0D2B55,#1A4A8A);
  border-radius:16px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;overflow:hidden}
.login-logo img{width:60px;height:60px;object-fit:contain}
.login-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#0D2B55;margin-bottom:4px}
.login-sub{font-size:.84rem;color:#64748b;margin-bottom:6px}
.login-badge{display:inline-block;background:#fef3c7;border:1px solid #fde68a;color:#92400e;
  border-radius:8px;padding:5px 14px;font-size:.78rem;font-weight:700;margin-bottom:22px}
.err-box{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:8px;
  padding:10px 14px;font-size:.83rem;margin-bottom:14px;display:none}
.field{margin-bottom:16px;text-align:left}
.field label{display:block;font-size:.73rem;font-weight:700;color:#64748b;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;
  font-size:.93rem;font-family:'DM Sans',sans-serif;background:#f8fafc;transition:.2s}
.field input:focus{outline:none;border-color:#0D2B55;background:#fff;box-shadow:0 0 0 3px rgba(13,43,85,.1)}
.btn-enter{width:100%;padding:13px;background:linear-gradient(135deg,#0D2B55,#1A4A8A);
  border:none;border-radius:10px;color:#fff;font-size:.98rem;font-weight:700;
  font-family:'Syne',sans-serif;cursor:pointer;margin-top:4px;transition:.2s}
.btn-enter:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(13,43,85,.3)}
.btn-enter:disabled{opacity:.6;cursor:not-allowed;transform:none}
.back-link{display:block;margin-top:18px;font-size:.82rem;color:#94a3b8;text-decoration:none}
.back-link:hover{color:#0D2B55}

/* ── PANEL ── */
#panelWrap{display:none}
.topbar{background:linear-gradient(135deg,#0a1628,#0D2B55);height:58px;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.3)}
.topbar-brand{display:flex;align-items:center;gap:10px;color:#fff}
.topbar-brand img{width:34px;height:34px;border-radius:8px;object-fit:contain;background:rgba(255,255,255,.1);padding:3px}
.topbar-brand div{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800}
.topbar-brand small{font-size:.7rem;opacity:.5;font-weight:400;display:block;margin-top:-2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;
  border-radius:20px;padding:4px 12px;font-size:.78rem;font-weight:600}
.btn-out{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#fca5a5;
  border-radius:8px;padding:5px 14px;font-size:.8rem;font-weight:600;cursor:pointer}

.content{padding:22px 24px;max-width:1300px;margin:0 auto}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #e2e8f0;
  box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;align-items:center;gap:14px}
.stat-ico{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:1.3rem;flex-shrink:0}
.stat-val{font-size:1.7rem;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.stat-lbl{font-size:.72rem;color:#64748b;text-transform:uppercase;letter-spacing:.4px;font-weight:600}

/* Tabs */
.tabs{display:flex;gap:3px;background:#e2e8f0;border-radius:10px;padding:3px;width:fit-content;margin-bottom:18px}
.tab{padding:8px 18px;border:none;background:none;border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:.88rem;font-weight:500;color:#64748b;cursor:pointer;transition:.15s}
.tab.on{background:#fff;color:#0D2B55;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.tab-body{display:none}
.tab-body.on{display:block}

/* Cards/Tables */
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:16px;overflow:hidden}
.card-hd{padding:14px 18px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.card-hd h3{font-size:.9rem;font-weight:700;color:#1e293b}
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{padding:9px 14px;text-align:left;font-size:.71rem;font-weight:700;color:#64748b;
  text-transform:uppercase;letter-spacing:.5px;background:#f8fafc;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #f8fafc;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.emp-hdr td{background:linear-gradient(135deg,#0D2B55,#1A4A8A)!important;
  color:#fff;font-size:.76rem;font-weight:700;letter-spacing:.4px;padding:7px 14px}

/* Badges */
.bdg{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.73rem;font-weight:700;white-space:nowrap}
.bdg-green{background:#f0fdf4;color:#059669;border:1px solid #a7f3d0}
.bdg-yellow{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.bdg-red{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.bdg-blue{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.bdg-gray{background:#f8fafc;color:#64748b;border:1px solid #e2e8f0}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border:none;
  border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,#0D2B55,#1A4A8A);color:#fff}
.btn-green{background:#059669;color:#fff}
.btn-yellow{background:#d97706;color:#fff}
.btn-gray{background:#f1f5f9;color:#374151;border:1px solid #e2e8f0}
.btn-sm{padding:4px 10px;font-size:.75rem}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;
  align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:26px;width:100%;max-width:460px;
  box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:#0D2B55;margin-bottom:18px}
.mfield{margin-bottom:13px}
.mfield label{display:block;font-size:.73rem;font-weight:700;color:#64748b;
  text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.mfield input,.mfield select{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;
  border-radius:8px;font-size:.88rem;font-family:'DM Sans',sans-serif;transition:.2s}
.mfield input:focus,.mfield select:focus{outline:none;border-color:#0D2B55}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* Search */
.search{padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;
  font-size:.86rem;font-family:'DM Sans',sans-serif;width:100%;max-width:320px;margin-bottom:12px}
.search:focus{outline:none;border-color:#0D2B55}

/* Toast */
#toast{position:fixed;bottom:22px;right:22px;padding:11px 18px;border-radius:10px;
  color:#fff;font-size:.86rem;font-weight:500;z-index:9999;
  transform:translateY(80px);transition:.3s;box-shadow:0 6px 20px rgba(0,0,0,.2)}
#toast.show{transform:translateY(0)}
#toast.ok{background:#059669}
#toast.err{background:#dc2626}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <img src="/logo.png" alt="VEF" onerror="this.parentElement.innerHTML='🛡️'">
    </div>
    <div class="login-title">Panel de Administración</div>
    <div class="login-sub">Sistema VEF ERP</div>
    <div class="login-badge">🔐 Acceso Restringido</div>
    <div id="loginErr" class="err-box"></div>
    <div class="field">
      <label>Contraseña del Administrador</label>
      <input type="password" id="adminPwd" placeholder="••••••••••"
        autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-enter" id="btnLogin" onclick="doLogin()">Entrar al Panel</button>
    <a href="/" class="back-link">← Volver al sistema</a>
  </div>
</div>

<!-- PANEL -->
<div id="panelWrap">
  <div class="topbar">
    <div class="topbar-brand">
      <img src="/logo.png" onerror="this.style.display='none'">
      <div>VEF ERP <small>Panel de Administración</small></div>
    </div>
    <div class="topbar-right">
      <span class="chip">🛡️ Administrador</span>
      <button class="btn-out" onclick="salir()">Salir</button>
    </div>
  </div>

  <div class="content">
    <div class="stats" id="statsRow"></div>
    <div class="tabs">
      <button class="tab on" onclick="showTab('tabEmps',this)">🏢 Empresas</button>
      <button class="tab" id="tabUsrsBtn" onclick="showTab('tabUsrs',this)">👥 Usuarios</button>
    </div>

    <!-- Empresas -->
    <div id="tabEmps" class="tab-body on">
      <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
        <button class="btn btn-primary" onclick="mNuevaEmpresa()">➕ Nueva Empresa</button>
      </div>
      <div class="card">
        <table>
          <thead><tr>
            <th>Empresa</th><th>Schema BD</th><th>Usuarios</th>
            <th>Suscripción</th><th>Vence</th><th style="min-width:280px">Acciones</th>
          </tr></thead>
          <tbody id="tbEmps"></tbody>
        </table>
      </div>
    </div>

    <!-- Usuarios -->
    <div id="tabUsrs" class="tab-body">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <input class="search" id="searchUsr" placeholder="Buscar usuario o empresa..." oninput="filtrar()">
        <button class="btn btn-primary" onclick="mNuevoUsuario()">➕ Nuevo Usuario</button>
      </div>
      <div class="card">
        <table>
          <thead><tr>
            <th>Usuario</th><th>Nombre</th><th>Rol</th>
            <th>Último acceso</th><th style="min-width:320px">Acciones</th>
          </tr></thead>
          <tbody id="tbUsrs"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="modal-bg" id="mBg" onclick="if(event.target===this)cModal()">
  <div class="modal" id="mBox">
    <h3 id="mTitle">Modal</h3>
    <div id="mBody"></div>
    <div class="mfoot" id="mFoot"></div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
var TOKEN = sessionStorage.getItem('adm_token');
var DATA  = {empresas:[], usuarios:[]};
var SEL   = {};

// ── Auto-login si hay token guardado ─────────────────
if(TOKEN) cargar();

// ── Login ─────────────────────────────────────────────
async function doLogin(){
  var pwd = document.getElementById('adminPwd').value.trim();
  var err = document.getElementById('loginErr');
  var btn = document.getElementById('btnLogin');
  if(!pwd){ showErr('Ingresa la contraseña'); return; }
  err.style.display='none';
  btn.disabled=true; btn.textContent='Verificando...';
  try {
    var r = await fetch('/api/admin/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pwd})
    });
    var ct = r.headers.get('content-type')||'';
    if(!ct.includes('json')) throw new Error('Error del servidor. Reinicia el servidor.');
    var d = await r.json();
    if(!r.ok) throw new Error(d.error||'Acceso denegado');
    TOKEN = d.token;
    sessionStorage.setItem('adm_token', TOKEN);
    await cargar();
  } catch(e) {
    showErr(e.message);
    btn.disabled=false; btn.textContent='Entrar al Panel';
  }
}

function showErr(msg){
  var el=document.getElementById('loginErr');
  el.textContent=msg; el.style.display='block';
}

// ── API ───────────────────────────────────────────────
async function api(url, method, body){
  method = method||'GET';
  var opts={method:method,headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'}};
  if(body) opts.body=JSON.stringify(body);
  var r = await fetch(url,opts);
  var ct = r.headers.get('content-type')||'';
  if(!ct.includes('json')) throw new Error('Error de servidor');
  var d = await r.json();
  if(r.status===401||r.status===403){
    sessionStorage.removeItem('adm_token');
    location.reload();
    throw new Error(d.error||'Sin acceso');
  }
  if(!r.ok) throw new Error(d.error||'Error '+r.status);
  return d;
}

// ── Cargar panel ──────────────────────────────────────
async function cargar(){
  try {
    var d = await api('/api/admin/panel');
    DATA = d;
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('panelWrap').style.display='block';
    console.log('Panel data - empresas:', DATA.empresas?.length, 'usuarios:', DATA.usuarios?.length);
    if(DATA.usuarios?.length) console.log('Sample user:', JSON.stringify(DATA.usuarios[0]));
    renderStats();
    renderEmpresas();
    renderUsuarios();
    // Update tab labels with counts
    var tb = document.getElementById('tabUsrsBtn');
    if(tb) tb.textContent = '👥 Usuarios (' + (DATA.usuarios||[]).length + ')';
  } catch(e) {
    sessionStorage.removeItem('adm_token');
    TOKEN=null;
    showErr(e.message);
  }
}

// ── Helpers ───────────────────────────────────────────
function esc(s){ if(!s) return ''; var d=document.createElement('div');d.textContent=String(s);return d.innerHTML; }
function fmt(d){ if(!d) return '—'; return new Date(d).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}); }
function toast(msg,tipo){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='show '+(tipo==='err'?'err':'ok');
  setTimeout(function(){el.className='';},3500);
}

function suscBadge(e){
  var hoy=new Date();
  if(e.suscripcion_estatus==='activa'&&e.suscripcion_hasta&&new Date(e.suscripcion_hasta)>=hoy)
    return '<span class="bdg bdg-green">✅ Activa</span>';
  if(e.suscripcion_estatus==='trial'&&e.trial_hasta&&new Date(e.trial_hasta)>=hoy){
    var d=Math.ceil((new Date(e.trial_hasta)-hoy)/86400000);
    return '<span class="bdg bdg-yellow">⏳ Trial '+d+'d</span>';
  }
  return '<span class="bdg bdg-red">🔴 Vencida</span>';
}

function rolBadge(r){
  var m={admin:'bdg-red',ventas:'bdg-blue',compras:'bdg-blue',almacen:'bdg-yellow',gerencia:'bdg-green'};
  return '<span class="bdg '+(m[r]||'bdg-gray')+'">'+esc(r||'usuario')+'</span>';
}

// ── Stats ─────────────────────────────────────────────
function renderStats(){
  var s=DATA.stats||{};
  var emps=DATA.empresas||[];
  var usrs=DATA.usuarios||[];
  var hoy=new Date();
  var activas=emps.filter(function(e){return e.activa;}).length;
  var trial=emps.filter(function(e){return e.suscripcion_estatus==='trial'&&e.trial_hasta&&new Date(e.trial_hasta)>=hoy;}).length;
  document.getElementById('statsRow').innerHTML=[
    ['🏢',emps.length,'Empresas','#0D2B55','#eff6ff'],
    ['✅',activas,'Activas','#059669','#f0fdf4'],
    ['⏳',trial,'En Trial','#d97706','#fffbeb'],
    ['👥',usrs.length,'Usuarios','#7c3aed','#faf5ff']
  ].map(function(s){
    return '<div class="stat">'+
      '<div class="stat-ico" style="background:'+s[4]+'">'+s[0]+'</div>'+
      '<div><div class="stat-val" style="color:'+s[3]+'">'+s[1]+'</div>'+
      '<div class="stat-lbl">'+s[2]+'</div></div></div>';
  }).join('');
}

// ── Empresas ──────────────────────────────────────────
function renderEmpresas(){
  var rows=DATA.empresas||[];
  document.getElementById('tbEmps').innerHTML = rows.length ? rows.map(function(e){
    var schema='emp_'+e.slug.replace(/[^a-z0-9]/g,'_');
    return '<tr>'+
      '<td><strong>'+esc(e.nombre)+'</strong><br>'+
        '<span style="font-size:.72rem;color:#94a3b8">id:'+e.id+'</span></td>'+
      '<td><code style="background:#f1f5f9;padding:1px 7px;border-radius:4px;font-size:.76rem">'+schema+'</code></td>'+
      '<td style="text-align:center;font-weight:700">'+e.total_usuarios+'</td>'+
      '<td>'+suscBadge(e)+'</td>'+
      '<td style="font-size:.79rem;color:#64748b">'+fmt(e.suscripcion_estatus==='activa'?e.suscripcion_hasta:e.trial_hasta)+'</td>'+
      '<td style="white-space:nowrap;display:flex;gap:4px;flex-wrap:wrap">'+
        '<button class="btn btn-sm btn-primary" onclick="mEditarEmpresa('+e.id+')">✏️ Editar</button>'+
        '<button class="btn btn-sm btn-green" onclick="mSusc('+e.id+',&quot;'+esc(e.nombre)+'&quot;)">⏳ Suscripción</button>'+
        '<button class="btn btn-sm btn-gray" onclick="toggleActiva('+e.id+','+e.activa+',&quot;'+esc(e.nombre)+'&quot;)">'+
          (e.activa?'🔴 Desactivar':'✅ Activar')+'</button>'+
        '<button class="btn btn-sm" style="background:#dc2626;color:#fff" onclick="mEliminarEmpresa('+e.id+',&quot;'+esc(e.nombre)+'&quot;)">🗑 Eliminar</button>'+
        '<button class="btn btn-sm" style="background:#7c2d12;color:#fff" onclick="mLimpiarDatos('+e.id+',&quot;'+esc(e.nombre)+'&quot;)">🧹 Limpiar Datos</button>'+
      '</td></tr>';
  }).join('') : '<tr><td colspan="6" style="color:#aaa;text-align:center;padding:24px">Sin empresas</td></tr>';
}

// ── Usuarios agrupados por empresa ───────────────────
function renderUsuarios(filtro){
  filtro=(filtro||'').toLowerCase();
  var usrs=DATA.usuarios||[];
  if(filtro) usrs=usrs.filter(function(u){
    return (u.username||'').toLowerCase().includes(filtro)||
           (u.nombre||'').toLowerCase().includes(filtro)||
           (u.empresa_nombre||'').toLowerCase().includes(filtro);
  });
  // Agrupar por empresa
  var grupos={};
  usrs.forEach(function(u){
    var k=u.empresa_nombre||'Sin empresa';
    if(!grupos[k]) grupos[k]=[];
    grupos[k].push(u);
  });

  var html='';
  if(!usrs.length){
    html='<tr><td colspan="5" style="color:#aaa;text-align:center;padding:24px">Sin usuarios</td></tr>';
  } else {
    Object.keys(grupos).sort().forEach(function(emp){
      html+='<tr class="emp-hdr"><td colspan="5">🏢 &nbsp;'+esc(emp)+
        ' <span style="opacity:.6;font-weight:400">('+grupos[emp].length+' usuario'+(grupos[emp].length>1?'s':'')+')</span></td></tr>';
      grupos[emp].forEach(function(u){
        html+='<tr>'+
          '<td style="padding-left:22px"><strong style="font-family:monospace;font-size:.83rem">'+esc(u.username)+'</strong>'+
            (u.email?'<br><span style="font-size:.72rem;color:#94a3b8">'+esc(u.email)+'</span>':'')+
          '</td>'+
          '<td>'+esc(u.nombre||'—')+'</td>'+
          '<td>'+rolBadge(u.rol)+'</td>'+
          '<td style="font-size:.76rem;color:#94a3b8">'+fmt(u.ultimo_acceso||u.created_at)+'</td>'+
          '<td style="white-space:nowrap;display:flex;gap:4px;flex-wrap:wrap">'+
            '<button class="btn btn-sm btn-primary" onclick="mEditarUsuario('+u.id+')">✏️ Editar</button>'+
            '<button class="btn btn-sm btn-yellow" onclick="mResetPass('+u.id+',&quot;'+esc(u.username)+'&quot;)">🔑 Contraseña</button>'+
            '<button class="btn btn-sm btn-gray" onclick="mCambiarEmp('+u.id+',&quot;'+esc(u.username)+'&quot;)">🏢 Empresa</button>'+
            '<button class="btn btn-sm" style="background:#dc2626;color:#fff" onclick="mEliminarUsuario('+u.id+',&quot;'+esc(u.username)+'&quot;)">🗑 Eliminar</button>'+
          '</td></tr>';
      });
    });
  }
  document.getElementById('tbUsrs').innerHTML=html;
}

function filtrar(){ renderUsuarios(document.getElementById('searchUsr').value); }

// ── Tabs ──────────────────────────────────────────────
function showTab(id,btn){
  document.querySelectorAll('.tab-body').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById(id).classList.add('on');
  btn.classList.add('on');
}

// ── Modal helpers ─────────────────────────────────────
function openModal(title,body,foot){
  document.getElementById('mTitle').textContent=title;
  document.getElementById('mBody').innerHTML=body;
  document.getElementById('mFoot').innerHTML=foot;
  document.getElementById('mBg').classList.add('open');
}
function cModal(){ document.getElementById('mBg').classList.remove('open'); }

function fv(id){ var el=document.getElementById(id); return el?el.value:''; }

// ── Reset contraseña ──────────────────────────────────
function mResetPass(id,username){
  SEL.uid=id;
  openModal('🔑 Restablecer contraseña — @'+username,
    '<div class="mfield"><label>Nueva contraseña (mínimo 6 caracteres)</label>'+
    '<input id="m_pass" type="text" value="password123"></div>',
    '<button class="btn btn-gray" onclick="cModal()">Cancelar</button>'+
    '<button class="btn btn-primary" onclick="doResetPass()">🔑 Cambiar</button>');
}
async function doResetPass(){
  var p=fv('m_pass').trim();
  if(!p||p.length<6){toast('Mínimo 6 caracteres','err');return;}
  try{
    var r=await api('/api/admin/usuarios/'+SEL.uid+'/reset','POST',{nueva_password:p});
    toast('✅ Contraseña de @'+r.usuario.username+' → "'+p+'"');
    cModal();
  }catch(e){toast(e.message,'err');}
}

// ── Cambiar empresa ───────────────────────────────────
function mCambiarEmp(id,username){
  SEL.uid=id;
  var opts=(DATA.empresas||[]).map(function(e){
    return '<option value="'+e.id+'">'+esc(e.nombre)+'</option>';
  }).join('');
  openModal('🏢 Cambiar empresa — @'+username,
    '<div class="mfield"><label>Asignar a empresa</label>'+
    '<select id="m_emp">'+opts+'</select></div>',
    '<button class="btn btn-gray" onclick="cModal()">Cancelar</button>'+
    '<button class="btn btn-primary" onclick="doCambiarEmp()">💾 Guardar</button>');
}
async function doCambiarEmp(){
  var empId=parseInt(fv('m_emp'));
  try{
    var r=await api('/api/admin/usuarios/'+SEL.uid+'/empresa','PUT',{empresa_id:empId});
    toast('✅ Empresa asignada — Schema: '+r.schema);
    cModal(); await cargar();
  }catch(e){toast(e.message,'err');}
}

// ── Suscripción ───────────────────────────────────────
function mSusc(id,nombre){
  SEL.empId=id;
  openModal('⏳ Suscripción — '+nombre,
    '<div class="mfield"><label>Acción</label>'+
    '<select id="m_saccion">'+
      '<option value="trial">Extender Trial</option>'+
      '<option value="activa">Activar Suscripción Pagada</option>'+
    '</select></div>'+
    '<div class="mfield"><label>Días</label><input id="m_sdias" type="number" value="30" min="1" max="365"></div>',
    '<button class="btn btn-gray" onclick="cModal()">Cancelar</button>'+
    '<button class="btn btn-primary" onclick="doSusc()">💾 Aplicar</button>');
}
async function doSusc(){
  var tipo=fv('m_saccion'), dias=parseInt(fv('m_sdias'))||30;
  var body=tipo==='trial'?{dias_trial:dias}:{suscripcion_activa:true,dias_suscripcion:dias};
  try{
    await api('/api/admin/empresas/'+SEL.empId,'PUT',body);
    toast('✅ Suscripción actualizada');
    cModal(); await cargar();
  }catch(e){toast(e.message,'err');}
}

async function toggleActiva(id,activa,nombre){
  if(!confirm((activa?'¿Desactivar':'¿Activar')+' "'+nombre+'"?'))return;
  try{
    await api('/api/admin/empresas/'+id,'PUT',{activa:!activa});
    toast(activa?'Empresa desactivada':'✅ Empresa activada');
    await cargar();
  }catch(e){toast(e.message,'err');}
}

// ── Nueva empresa ─────────────────────────────────────
function mNuevaEmpresa(){
  openModal('➕ Nueva Empresa',
    '<div class="mfield"><label>Nombre *</label>'+
    '<input id="m_enom" placeholder="Empresa ABC S.A." oninput="'+
      'document.getElementById(\'m_eslug\').value=this.value.toLowerCase()'+
      '.replace(/[^a-z0-9]/g,\'_\').replace(/_+/g,\'_\').slice(0,30)"></div>'+
    '<div class="mfield"><label>Slug (ID único en BD) *</label>'+
    '<input id="m_eslug" placeholder="empresa_abc">'+
    '<div style="font-size:.72rem;color:#94a3b8;margin-top:3px">Solo letras/números/guiones. No se puede cambiar.</div></div>'+
    '<div class="mfield"><label>Días de trial</label>'+
    '<input id="m_edias" type="number" value="30" min="1"></div>',
    '<button class="btn btn-gray" onclick="cModal()">Cancelar</button>'+
    '<button class="btn btn-primary" onclick="doNuevaEmpresa()">✅ Crear</button>');
}
async function doNuevaEmpresa(){
  var nom=fv('m_enom').trim(), slug=fv('m_eslug').trim(), dias=parseInt(fv('m_edias'))||30;
  if(!nom||!slug){toast('Nombre y slug requeridos','err');return;}
  try{
    var r=await api('/api/admin/empresas','POST',{nombre:nom,slug:slug,dias_trial:dias});
    toast('✅ Empresa "'+nom+'" creada — Schema: '+r.schema);
    cModal(); await cargar();
  }catch(e){toast(e.message,'err');}
}

// ── Nuevo usuario ─────────────────────────────────────
function mNuevoUsuario(){
  var empOpts='<option value="">— Sin empresa —</option>'+(DATA.empresas||[]).map(function(e){
    return '<option value="'+e.id+'">'+esc(e.nombre)+'</option>';
  }).join('');
  openModal('➕ Nuevo Usuario',
    '<div class="mfield"><label>Username / Email *</label><input id="m_uuser" placeholder="usuario@empresa.com"></div>'+
    '<div class="mfield"><label>Nombre completo</label><input id="m_unom" placeholder="Juan Pérez"></div>'+
    '<div class="mfield"><label>Contraseña *</label><input id="m_upass" value="password123"></div>'+
    '<div class="mfield"><label>Rol</label><select id="m_urol">'+
      '<option value="usuario">Usuario</option><option value="admin">Admin</option>'+
      '<option value="ventas">Ventas</option><option value="compras">Compras</option>'+
      '<option value="almacen">Almacén</option><option value="gerencia">Gerencia</option>'+
    '</select></div>'+
    '<div class="mfield"><label>Empresa</label><select id="m_uemp">'+empOpts+'</select></div>',
    '<button class="btn btn-gray" onclick="cModal()">Cancelar</button>'+
    '<button class="btn btn-primary" onclick="doNuevoUsuario()">✅ Crear</button>');
}
async function doNuevoUsuario(){
  var user=fv('m_uuser').trim(), nom=fv('m_unom').trim();
  var pass=fv('m_upass'), rol=fv('m_urol');
  var empId=parseInt(fv('m_uemp'))||null;
  if(!user||!pass){toast('Username y contraseña requeridos','err');return;}
  try{
    await api('/api/admin/usuarios','POST',{username:user,nombre:nom,password:pass,rol:rol,empresa_id:empId});
    toast('✅ Usuario @'+user+' creado');
    cModal(); await cargar();
  }catch(e){toast(e.message,'err');}
}

// ── Editar Usuario ───────────────────────────────────
function mEditarUsuario(id){
  var u=(DATA.usuarios||[]).find(function(x){return x.id===id;});
  if(!u){toast('Usuario no encontrado','err');return;}
  SEL.uid=id;
  var rolOpts=['usuario','admin','ventas','compras','almacen','gerencia'].map(function(r){
    return '<option value="'+r+'"'+(u.rol===r?' selected':'')+'>'+r+'</option>';
  }).join('');
  openModal('✏️ Editar Usuario — @'+esc(u.username),
    '<div class="mfield"><label>Nombre completo</label>'+
      '<input id="eu_nom" value="'+esc(u.nombre||'')+'"></div>'+
    '<div class="mfield"><label>Email</label>'+
      '<input id="eu_email" type="email" value="'+esc(u.email||'')+'"></div>'+
    '<div class="mfield"><label>Rol</label>'+
      '<select id="eu_rol">'+rolOpts+'</select></div>'+
    '<div class="mfield"><label>Estado</label>'+
      '<select id="eu_activo">'+
        '<option value="true"'+(u.activo!==false?' selected':'')+'>✅ Activo</option>'+
        '<option value="false"'+(u.activo===false?' selected':'')+'>🔴 Inactivo</option>'+
      '</select></div>',
    '<button class="btn btn-gray" onclick="cModal()">Cancelar</button>'+
    '<button class="btn btn-primary" onclick="doEditarUsuario()">💾 Guardar</button>');
}
async function doEditarUsuario(){
  var body={
    nombre: document.getElementById('eu_nom').value.trim(),
    email:  document.getElementById('eu_email').value.trim(),
    rol:    document.getElementById('eu_rol').value,
    activo: document.getElementById('eu_activo').value==='true'
  };
  try{
    await api('/api/usuarios/'+SEL.uid,'PUT',body);
    toast('✅ Usuario actualizado');
    cModal(); await cargar();
  }catch(e){toast(e.message,'err');}
}

// ── Eliminar Usuario ──────────────────────────────────
async function mEliminarUsuario(id, username){
  if(!confirm('¿Eliminar el usuario @'+username+'?\nEsta acción no se puede deshacer.'))return;
  try{
    await api('/api/usuarios/'+id,'DELETE');
    toast('✅ Usuario @'+username+' eliminado');
    await cargar();
  }catch(e){toast(e.message,'err');}
}

// ── Editar Empresa ────────────────────────────────────
function mEditarEmpresa(id){
  var e=(DATA.empresas||[]).find(function(x){return x.id===id;});
  if(!e){toast('Empresa no encontrada','err');return;}
  SEL.empId=id;
  openModal('✏️ Editar Empresa',
    '<div class="mfield"><label>Nombre de la empresa</label>'+
      '<input id="ee_nom" value="'+esc(e.nombre||'')+'"></div>',
    '<button class="btn btn-gray" onclick="cModal()">Cancelar</button>'+
    '<button class="btn btn-primary" onclick="doEditarEmpresa()">💾 Guardar</button>');
}
async function doEditarEmpresa(){
  var nombre=document.getElementById('ee_nom').value.trim();
  if(!nombre){toast('El nombre es requerido','err');return;}
  try{
    await api('/api/admin/empresas/'+SEL.empId,'PUT',{nombre});
    toast('✅ Empresa actualizada');
    cModal(); await cargar();
  }catch(e){toast(e.message,'err');}
}

// ── Eliminar Empresa ──────────────────────────────────
async function mEliminarEmpresa(id, nombre){
  if(!confirm('⚠️ ¿Eliminar la empresa "'+nombre+'"?\n\nEsto desactivará la empresa.\nLos datos en su schema NO se borran de la BD.'))return;
  try{
    await api('/api/admin/empresas/'+id,'PUT',{activa:false});
    toast('Empresa "'+nombre+'" desactivada');
    await cargar();
  }catch(e){toast(e.message,'err');}
}

async function mLimpiarDatos(id, nombre){
  if(!confirm('🚨 ADVERTENCIA CRÍTICA\n\n¿Eliminar TODOS los datos de la empresa "'+nombre+'"?\n\nEsto borrará permanentemente:\n• Clientes, Proveedores, Proyectos\n• Cotizaciones, Facturas, Egresos\n• Inventario, Tareas, PDFs\n\n¡Esta acción NO se puede deshacer!'))return;
  if(!confirm('Segunda confirmación: ¿Estás SEGURO que deseas borrar TODOS los datos de "'+nombre+'"?'))return;
  try{
    const r = await fetch('/api/admin/schema-data/'+id+'?key=vef2025',{method:'DELETE',headers:{Authorization:'Bearer '+localStorage.getItem('adm_token')}});
    const data = await r.json();
    if(data.ok){
      toast('✅ Datos de "'+nombre+'" eliminados correctamente');
      // Mostrar resumen
      const resumen = Object.entries(data.deleted||{}).filter(([,v])=>typeof v==='number'&&v>0).map(([t,n])=>`${t}: ${n}`).join(', ');
      if(resumen) alert('Registros eliminados:\n'+resumen);
    } else {
      toast(data.error||'Error al limpiar','err');
    }
  }catch(e){toast(e.message,'err');}
}

// ── Salir ─────────────────────────────────────────────
function salir(){
  if(!confirm('¿Cerrar el panel de administración?'))return;
  sessionStorage.removeItem('adm_token');
  location.reload();
}
</script>
